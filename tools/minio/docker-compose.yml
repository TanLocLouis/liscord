services:
  s3-storage:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    ports:
      - "9000:9000" # API Port (Your code connects here)
      - "9001:9001" # Console Port (The Web UI)
    environment:
      MINIO_ROOT_USER:
      MINIO_ROOT_PASSWORD:
      - ./data:/data
    command: server /data --console-address ":9001"
